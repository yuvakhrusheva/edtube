<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Quize-Mode</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        min-width: 240px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
        color: #0f0f0f;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      label {
        font-weight: 500;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #606060;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="study-mode-toggle">Режим учёбы</label>
      <input type="checkbox" id="study-mode-toggle" />
    </div>
    <p class="status" id="study-mode-status">Выключено</p>
    <script src="popup.js"></script>
  </body>
</html>
